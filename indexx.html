<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Alif Maulana Hadiyuddin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f4f4f4;
      color: #222;
      line-height: 1.6;
scroll-behavior: smooth;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 60px 20px;
    }

 .hero {
  background: url("bg.jpg") center/cover no-repeat;
  color: white;
  text-align: center;
  padding: 160px 20px 120px 20px;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
  pointer-events: none;
}
.hero .container {
  position: relative;
  z-index: 2;
}

.buttons {
  position: relative;
  z-index: 2;
}

.hero .container {
  position: relative;
  z-index: 2;
}

.hero::after {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
  top: -200px;
  right: -200px;
}
